model_list:
  # DeepSeek 官方（需要配置环境变量：DEEPSEEK_API_KEY）
  - model_name: deepseek/deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_base: https://api.deepseek.com/v1
      api_key: "os.environ/DEEPSEEK_API_KEY"

  # OpenAI / 兼容 OpenAI 的中转平台（需要：OPENAI_API_KEY；可选：OPENAI_BASE_URL）
  - model_name: openai/gpt-4.1-free
    litellm_params:
      model: openai/gpt-4.1-free
      api_key: "os.environ/AIHUBMIX_KEY"
      api_base: "https://aihubmix.com/v1"

  # 智谱 GLM / coding-glm（通常通过 OpenAI 兼容中转平台访问）
  - model_name: openai/coding-glm-5.1-free
    litellm_params:
      model: openai/coding-glm-5.1-free
      api_key: "os.environ/AIHUBMIX_KEY"
      api_base: "https://aihubmix.com/v1"

  # Gemini（需要：GEMINI_API_KEY）
  - model_name: gemini/gemini-3-flash-preview-free
    litellm_params:
      model: gemini/gemini-3-flash-preview-free
      api_key: "os.environ/GEMINI_API_KEY"
